<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Iniciar Sesion - Portafolio</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="img/AE_Solutions_Logo.png">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            .login-container {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: var(--dark-color);
                background-image: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(15, 29, 53, 1) 100%);
            }
            .login-card {
                background: rgba(26, 42, 74, 0.7);
                backdrop-filter: blur(10px);
                border: 1px solid var(--border-subtle);
                padding: 4rem 3rem;
                border-radius: 1.5rem;
                width: 100%;
                max-width: 450px;
                text-align: center;
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            }
            .login-logo {
                width: 8rem;
                height: 8rem;
                border-radius: 50%;
                object-fit: cover;
                margin-bottom: 2rem;
                border: 3px solid var(--accent-warm);
            }
            .login-title {
                color: var(--text-primary);
                font-size: 2.2rem;
                margin-bottom: 0.5rem;
            }
            .login-subtitle {
                color: var(--text-secondary);
                font-size: 1.4rem;
                margin-bottom: 3rem;
            }
            .login-form {
                display: flex;
                flex-direction: column;
                gap: 2rem;
            }
            .login-input-group {
                text-align: left;
            }
            .login-input-group label {
                display: block;
                color: var(--text-primary);
                margin-bottom: 0.8rem;
                font-size: 1.4rem;
                font-weight: 500;
            }
            .login-input-wrapper {
                position: relative;
                display: flex;
                align-items: center;
            }
            .login-input-wrapper i {
                position: absolute;
                left: 1.5rem;
                color: var(--accent-light);
                font-size: 1.4rem;
            }
            .login-input-wrapper input {
                width: 100%;
                padding: 1.2rem 1.5rem 1.2rem 4rem;
                background: rgba(15, 29, 53, 0.6);
                border: 1px solid var(--border-subtle);
                border-radius: 0.8rem;
                color: var(--text-primary);
                font-size: 1.4rem;
                font-family: inherit;
                transition: all 0.3s ease;
            }
            .login-input-wrapper input:focus {
                outline: none;
                border-color: var(--accent-warm);
                box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            }
            .login-button {
                background: linear-gradient(135deg, var(--accent-color), var(--accent-warm));
                color: white;
                border: none;
                padding: 1.4rem;
                border-radius: 0.8rem;
                font-size: 1.5rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                font-family: inherit;
                margin-top: 1rem;
            }
            .login-button:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
            }
            .login-link {
                margin-top: 2rem;
                font-size: 1.4rem;
                color: var(--text-secondary);
            }
            .login-link a {
                color: var(--accent-warm);
                text-decoration: none;
                font-weight: 600;
            }
            .login-link a:hover {
                text-decoration: underline;
            }
            .error-message {
                color: #ef4444;
                font-size: 1.3rem;
                margin-top: -1rem;
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            <div class="login-card">
                <img src="img/AE_Solutions_Logo.png" alt="Logo AE Solutions" class="login-logo">
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Ingresa para ver el portafolio</p>
                
                <form id="formularioLogin" class="login-form">
                    <div class="login-input-group">
                        <label for="inputNombre">Nombre de Usuario</label>
                        <div class="login-input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="inputNombre" placeholder="Escribe tu nombre..." required autocomplete="off">
                        </div>
                    </div>

                    <p id="mensajeError" class="error-message">Usuario no registrado.</p>

                    <button type="submit" class="login-button">
                        Ingresar <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                </form>

                <p class="login-link">¿No tienes cuenta? <a href="registro.html">Registrate aqui</a></p>
            </div>
        </div>

        <script src="login.js"></script>
    </body>
</html>
